name: VEGA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,__pycache__,.git,data,scripts
          # Warn on style issues (don't fail)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 \
            --statistics --exclude=venv,__pycache__,.git,data,scripts
        continue-on-error: true

      - name: Run unit tests
        run: |
          python -m pytest tests/test_core.py -v --timeout=30 \
            -k "TestConfig or TestEventBus or TestMemory or TestSecurity or TestModelRouter or TestScheduler" \
            2>&1 || true
        env:
          PYTHONPATH: .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
